version: '3.8'

services:
  analytics-api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - CLICKHOUSE_URL=clickhouse://clickhouse:9000/analytics
    depends_on:
      - clickhouse

  dashboard:
    build: ./apps/dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000/graphql

  clickhouse:
    image: clickhouse/clickhouse-server:24.2
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse

volumes:
  chdata:
